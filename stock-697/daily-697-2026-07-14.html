<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">

<title>697 首程控股 — 每日朝早摘要 2026-07-14</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Noto Sans HK', 'PingFang HK', sans-serif;
    background: #0a1628;
    color: #e0e8f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .card {
    background: linear-gradient(145deg, #0f1f3a 0%, #142b4d 100%);
    border: 1px solid #1e3a5f;
    border-radius: 16px;
    padding: 40px;
    max-width: 640px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 22px;
    color: #7eb8ff;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: 14px;
    color: #6b8db5;
    margin-bottom: 28px;
    border-bottom: 1px solid #1e3a5f;
    padding-bottom: 16px;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-label {
    font-size: 12px;
    color: #6b8db5;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #e0e8f0;
  }
  .stat-value.green { color: #4ade80; }
  .stat-value.red { color: #f87171; }
  .stat-value.neutral { color: #94a3b8; }
  .stat-detail {
    font-size: 12px;
    color: #6b8db5;
    margin-top: 4px;
  }
  .alert-section {
    margin-top: 16px;
    padding: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid #1e3a5f;
    border-radius: 10px;
  }
  .alert-section h3 {
    font-size: 14px;
    color: #6b8db5;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .alert-none {
    text-align: center;
    padding: 12px;
    color: #4ade80;
    font-size: 14px;
  }
  .alert-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #1e3a5f10;
    font-size: 14px;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-time { color: #94a3b8; }
  .alert-price { color: #f87171; font-weight: 600; }
  .alert-dir { font-size: 12px; padding: 2px 8px; border-radius: 4px; }
  .alert-dir.up { background: rgba(74,222,128,0.15); color: #4ade80; }
  .alert-dir.down { background: rgba(248,113,113,0.15); color: #f87171; }
  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 12px;
    color: #3a5a7a;
    border-top: 1px solid #1e3a5f;
    padding-top: 16px;
  }
  @media (max-width: 480px) {
    .card { padding: 24px; }
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-value { font-size: 20px; }
  }
</style>
</head>

<div class="card">

      <div class="stat-value">$1.48</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">最高</div>

    </div>
    <div class="stat-box">

  </div>

  <div class="footer">
    由 無虛 (mo mo) 自動生成 • 2026-07-14 朝早

</div>
</body>
</html>
